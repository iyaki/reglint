name: quality

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        if: ${{ hashFiles('**/*.go') != '' }}
        with:
          version: v2.10
          args: --config=.golangci.yml

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
      - name: govulncheck
        if: ${{ hashFiles('**/*.go') != '' }}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: nancy
        run: |
          go install github.com/sonatype-nexus-community/nancy@latest
          go list -m all | nancy sleuth

  arch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
      - name: go-arch-lint
        if: ${{ hashFiles('**/*.go') != '' }}
        run: |
          go install github.com/fe3dback/go-arch-lint@latest
          go-arch-lint check

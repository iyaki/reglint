name: quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "~1.25.8"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "~1.25.8"
      - name: govulncheck
        if: ${{ hashFiles('**/*.go') != '' }}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  arch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "~1.25.8"
      - name: go-arch-lint
        if: ${{ hashFiles('**/*.go') != '' }}
        run: |
          go install github.com/fe3dback/go-arch-lint@latest
          go-arch-lint check

  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "~1.25.8"
      - name: go-mutesting
        if: ${{ hashFiles('**/*.go') != '' }}
        run: |
          go install github.com/avito-tech/go-mutesting/cmd/go-mutesting@latest
          bash scripts/quality.sh mutation
